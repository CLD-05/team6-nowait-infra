
# =========================================================================
# AWS EKS 환경에서 접근 불가능한 마스터 노드 컴포넌트 감시 해제
# =========================================================================
kubeControllerManager:
  enabled: false

kubeScheduler:
  enabled: false

kubeProxy:
  enabled: false

# =========================================================================
# request/limit 합산 기준 overcommit 알림 그룹 비활성화
# =========================================================================
# 교육용 단일 EKS 클러스터는 kube_node_role(control-plane)이 잡히지 않아
# KubeCPUOvercommit이 거의 항상 non-HA 분기로 평가되어, 실사용률(kubectl top nodes 1~4%)과
# 무관하게 상시 발동한다. 실사용률 기반 경고는 nowait-alert-rules의 HighCpuUsage(80%)가 대체.
defaultRules:
  rules:
    kubernetesResources: false

# =========================================================================
# [NoWait 프로젝트] 프로메테우스 & 그라파나 & 알람매니저 통합 인프라 설정 파일
# 경로: envs/prod/platform-addons/helm-values/kube-prometheus-stack-values.yaml
# =========================================================================

# -------------------------------------------------------------------------
# 1. 프로메테우스 기지국 및 리소스 설정
# -------------------------------------------------------------------------
prometheus:
  prometheusSpec:
    enableRemoteWriteReceiver: true
    replicas: 1
    retention: 1d
    resources:
      requests:
        cpu: 200m
        memory: 1Gi
      limits:
        cpu: 1000m
        memory: 2Gi
    tolerations:
      - key: "dedicated"
        operator: "Equal"
        value: "monitoring"
        effect: "NoSchedule"
    nodeSelector:
      dedicated: monitoring

# -------------------------------------------------------------------------
# 2. 그라파나 대시보드 화면 및 AWS 연동 설정
# -------------------------------------------------------------------------
grafana:
  replicas: 1
  persistence:
    enabled: true
    type: pvc
    storageClassName: gp2
    accessModes:
      - ReadWriteOnce
    size: 5Gi

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  tolerations:
    - key: "dedicated"
      operator: "Equal"
      value: "monitoring"
      effect: "NoSchedule"

  nodeSelector:
    dedicated: monitoring

  ingress:
    enabled: true
    ingressClassName: alb
    annotations:
      kubernetes.io/ingress.class: alb
      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/target-type: ip
      alb.ingress.kubernetes.io/healthcheck-path: /api/health
      alb.ingress.kubernetes.io/healthcheck-port: "3000"
    hosts: []
    path: /
    pathType: Prefix

  # AWS RDS(MySQL) 및 ElastiCache(Redis) 모니터링을 위한 CloudWatch 연동
  additionalDataSources:
    - name: CloudWatch
      uid: cloudwatch
      type: cloudwatch
      jsonData:
        authType: default
        defaultRegion: ap-northeast-2

  # 쿠버네티스 ConfigMap에 등록된 대시보드 파일을 자동으로 감지해서 로딩
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: ALL

# -------------------------------------------------------------------------
# 3. 알람매니저 비상벨 및 라우팅/억제(Inhibit) 설정
# -------------------------------------------------------------------------
alertmanager:
  enabled: true

  alertmanagerSpec:
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

    # PVC를 통한 영구 저장 장치 설정 (파드 재시작 시 알람 억제 상태 유실 방지)
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: gp2
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 1Gi

    # 비밀 금고(Secret) 이름을 연동하여 Slack Webhook 주소 보안 유지
    secrets:
      - alertmanager-slack-webhook

  config:
    global:
      resolve_timeout: 5m

    route:
      receiver: "null"
      group_by: ["alertname", "severity", "namespace", "service"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        # P0 Critical: 더 빠르게 묶고, 반복 알림도 Warning보다 자주 보냄
        - receiver: slack-notifications
          matchers:
            - severity = "critical"
          group_wait: 10s
          group_interval: 2m
          repeat_interval: 1h

        # P1 Warning: 알림 피로도를 줄이기 위해 반복 주기를 길게 유지
        - receiver: slack-notifications
          matchers:
            - severity = "warning"
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 4h

    receivers:
      - name: "null"

      - name: slack-notifications
        slack_configs:
          - api_url_file: /etc/alertmanager/secrets/alertmanager-slack-webhook/url
            channel: "#nowait-alerts"
            send_resolved: true
            title: "{{ .CommonAnnotations.summary }}"
            text: |-
              {{ range .Alerts }}
              *상황:* {{ .Annotations.summary }}
              *상태:* {{ .Status | upper }}
              *등급:* {{ .Labels.severity }}
              *네임스페이스:* {{ .Labels.namespace }}
              *서비스:* {{ .Labels.service }}
              *상세 내용:* {{ .Annotations.description }}
              *발생 시각:* {{ .StartsAt.Local }}
              -------------------------------------
              {{ end }}

    # 알람 피로도(Alarm Fatigue) 방지를 위한 정밀 경고 억제 규칙
    inhibit_rules:
      # 1. 동일 알람/네임스페이스에서 Critical 발생 시 Warning 억제
      - source_matchers: ["severity = critical"]
        target_matchers: ["severity = warning"]
        equal: ["alertname", "namespace"]

      # 2. 동일 서비스/네임스페이스에서 Critical 발생 시 Warning 억제
      - source_matchers: ["severity = critical"]
        target_matchers: ["severity = warning"]
        equal: ["service", "namespace"]

      # 3. NoWait scrape job 전체 down 발생 시 개별 target down 경고 억제
      - source_matchers: ['alertname = "NowaitScrapeJobAllDown"']
        target_matchers: ['alertname = "NowaitScrapeTargetDown"']
        equal: ["namespace", "job"]

      # 4. Redis Eviction 발생 시 워커/큐 관련 종속 경고 억제
      - source_matchers: ['alertname = "RedisEviction발생"']
        target_matchers: ['alertname =~ "Worker저장지연증가|Worker저장실패증가|DeadLetter발생|DeadLetter지속적재|WorkerPendingQueue적체|WorkerProcessingQueue정체"']

      # 5-1. nowait-api P0 발생 시 nowait-api replica 부족 P1 억제
      - source_matchers: ['alertname =~ "nowaitapi가용Replica없음|nowaitapi가용Replica절반미만"']
        target_matchers: ['alertname = "nowaitapi가용Replica부족"']
        equal: ["namespace", "service"]

      # 5-2. nowait-api P0 발생 시 하위 Kubernetes 경고 억제
      # PendingPod지속발생 / Deployment가용Replica부족은 service 라벨이 kubernetes이므로 namespace 기준으로만 억제
      - source_matchers: ['alertname =~ "nowaitapi가용Replica없음|nowaitapi가용Replica절반미만"']
        target_matchers: ['alertname =~ "PendingPod지속발생|Deployment가용Replica부족"']
        equal: ["namespace"]

# -------------------------------------------------------------------------
# 4. NoWait 정밀 슬랙 알람 규칙 (P0 Critical / P1 Warning)
# -------------------------------------------------------------------------
additionalPrometheusRulesMap:
  nowait-core-alerts:
    groups:
      # ============================ P0 긴급 장애 (Critical) ============================
      - name: nowait-p0-critical
        rules:
          # ---------------------------------------------------------------------
          # Scrape 전체 장애
          # ---------------------------------------------------------------------
          - alert: NowaitScrapeJobAllDown
            expr: |
              sum by (namespace, job) (
                up{namespace="nowait-prod",job=~"nowait-api|waiting-worker|reservation-worker"}
              ) == 0
            for: 3m
            labels:
              severity: critical
              namespace: nowait-prod
              service: prometheus-target
            annotations:
              summary: "[🔥 P0 긴급 장애] NoWait scrape job 전체 down"
              description: |
                환경: prod
                조건: 특정 NoWait job의 모든 scrape target이 3분 이상 down
                대상 job: {{ $labels.job }}
                영향: 해당 컴포넌트 전체의 메트릭 수집이 중단되었습니다.
                우선 확인: Deployment/Pod 상태, Service/ServiceMonitor, actuator endpoint, 최근 배포 여부

          # ---------------------------------------------------------------------
          # API 장애
          # ---------------------------------------------------------------------
          - alert: API5xx에러율높음
            expr: |
              (
                sum(rate(http_server_requests_seconds_count{namespace="nowait-prod",job="nowait-api",status=~"5.."}[5m]))
                /
                clamp_min(
                  sum(rate(http_server_requests_seconds_count{namespace="nowait-prod",job="nowait-api"}[5m])),
                  1e-9
                )
              ) > 0.05
              and
              sum(rate(http_server_requests_seconds_count{namespace="nowait-prod",job="nowait-api"}[5m])) > 0.1
            for: 5m
            labels:
              severity: critical
              namespace: nowait-prod
              service: nowait-api
            annotations:
              summary: "[🔥 P0 긴급 장애] API 5xx 에러율 높음"
              description: |
                서비스: nowait-api / 환경: prod
                조건: 5xx 비율 > 5% (5분 지속, 요청량 0.1 req/s 초과)
                현재값: {{ $value | humanizePercentage }}
                영향: 다수 사용자 요청이 실패하고 있습니다.
                우선 확인: 애플리케이션 예외 로그, DB 커넥션 대기, Redis 연결 상태, 최근 배포 여부

          - alert: APIp95응답시간심각
            expr: |
              histogram_quantile(
                0.95,
                sum(rate(http_server_requests_seconds_bucket{namespace="nowait-prod",job="nowait-api",uri!~"/actuator.*"}[5m])) by (le)
              ) > 3
              and
              sum(rate(http_server_requests_seconds_count{namespace="nowait-prod",job="nowait-api",uri!~"/actuator.*"}[5m])) > 0.1
            for: 5m
            labels:
              severity: critical
              namespace: nowait-prod
              service: nowait-api
            annotations:
              summary: "[🔥 P0 긴급 장애] API p95 응답시간 심각"
              description: |
                서비스: nowait-api / 환경: prod
                조건: API p95 응답시간 > 3초 (5분 지속, 요청량 0.1 req/s 초과)
                현재값: {{ $value | printf "%.2f" }}초
                영향: 폴링 지연으로 인해 사용자 UI 상태 갱신이 크게 늦어질 수 있습니다.
                우선 확인: DB 커넥션 풀, Redis 지연, 특정 URI p95, CPU throttling, 최근 배포 여부

          # ---------------------------------------------------------------------
          # Redis / 데이터 유실 위험
          # ---------------------------------------------------------------------
          - alert: RedisEviction발생
            expr: sum(increase(redis_evicted_keys_total[5m])) > 0
            for: 0m
            labels:
              severity: critical
              namespace: nowait-prod
              service: redis
            annotations:
              summary: "[🔥 P0 긴급 장애] Redis Eviction 발생"
              description: |
                서비스: ElastiCache(team6-nowait-prod-redis) / 환경: prod
                조건: 최근 5분 Eviction 발생 (> 0)
                현재값: {{ $value | printf "%.0f" }}건
                영향: Redis가 메모리 부족으로 키를 제거했습니다. 웨이팅/예약 상태 데이터가 DB 반영 전에 유실될 위험이 있습니다.
                우선 확인: Redis maxmemory, TTL, pending/processing/dead-letter queue 길이, ElastiCache 메모리 사용률

          - alert: DeadLetter지속적재
            expr: |
              max(waiting_queue_deadletter{namespace="nowait-prod"})
              +
              max(reservation_queue_deadletter{namespace="nowait-prod"})
              > 0
            for: 15m
            labels:
              severity: critical
              namespace: nowait-prod
              service: nowait-worker
            annotations:
              summary: "[🔥 P0 긴급 장애] Dead Letter 지속 적재"
              description: |
                서비스: nowait-worker / 환경: prod
                조건: waiting 또는 reservation Dead Letter가 15분 이상 0보다 큼
                현재값: {{ $value | printf "%.0f" }}건
                영향: Redis에서 DB로 비동기 반영하지 못한 작업이 장시간 격리 큐에 남아 있습니다.
                우선 확인: Worker 로그, DB 예외, 재처리 가능 여부, 데이터 정합성

          - alert: WorkerPendingQueue심각적체
            expr: |
              max(waiting_queue_pending{namespace="nowait-prod"})
              +
              max(reservation_queue_pending{namespace="nowait-prod"})
              > 1000
            for: 10m
            labels:
              severity: critical
              namespace: nowait-prod
              service: nowait-worker
            annotations:
              summary: "[🔥 P0 긴급 장애] Worker Pending Queue 심각 적체"
              description: |
                서비스: nowait-worker / 환경: prod
                조건: waiting + reservation pending queue > 1000 (10분 지속)
                현재값: {{ $value | printf "%.0f" }}건
                영향: Redis에는 작업이 쌓이고 있으나 DB 영속화가 대량으로 지연되고 있습니다.
                우선 확인: KEDA 스케일링, Worker Pod 수, Worker 로그, DB 커넥션 대기, RDS CPU/Connection, Redis 상태

          # ---------------------------------------------------------------------
          # nowait-api 가용성
          # ---------------------------------------------------------------------
          - alert: nowaitapi가용Replica없음
            expr: |
              kube_deployment_status_replicas_available{namespace="nowait-prod",deployment="nowait-api"} == 0
              and on(namespace, deployment)
              kube_deployment_spec_replicas{namespace="nowait-prod",deployment="nowait-api"} > 0
            for: 2m
            labels:
              severity: critical
              namespace: nowait-prod
              service: nowait-api
            annotations:
              summary: "[🔥 P0 긴급 장애] nowait-api 가용 Replica 없음"
              description: |
                서비스: nowait-api / 환경: prod
                조건: nowait-api 가용 Pod가 2분 이상 0개
                영향: 사용자 API 요청을 처리할 수 없습니다.
                우선 확인: CrashLoopBackOff, ImagePullBackOff, readinessProbe 실패, 노드 스케줄링 실패, 최근 배포 여부

          - alert: nowaitapi가용Replica절반미만
            expr: |
              (
                kube_deployment_status_replicas_available{namespace="nowait-prod",deployment="nowait-api"}
                /
                clamp_min(
                  kube_deployment_spec_replicas{namespace="nowait-prod",deployment="nowait-api"},
                  1
                )
              ) < 0.5
              and on(namespace)
              (
                sum by(namespace) (
                  rate(http_server_requests_seconds_count{namespace="nowait-prod",job="nowait-api"}[5m])
                ) > 0.1
              )
            for: 5m
            labels:
              severity: critical
              namespace: nowait-prod
              service: nowait-api
            annotations:
              summary: "[🔥 P0 긴급 장애] nowait-api 가용 Replica 절반 미만"
              description: |
                서비스: nowait-api / 환경: prod
                조건: 요청이 있는 상태에서 가용 Replica 비율 < 50% (5분 지속)
                영향: API 처리 용량이 크게 부족합니다.
                우선 확인: HPA, Pending Pod, readiness 실패, CPU/Memory 부족, Karpenter 증설 지연

      # ============================ P1 주요 경고 (Warning) ============================
      - name: nowait-p1-warning
        rules:
          # ---------------------------------------------------------------------
          # Scrape 개별 target 장애
          # ---------------------------------------------------------------------
          - alert: NowaitScrapeTargetDown
            expr: |
              up{namespace="nowait-prod",job=~"nowait-api|waiting-worker|reservation-worker"} == 0
            for: 5m
            labels:
              severity: warning
              namespace: nowait-prod
              service: prometheus-target
            annotations:
              summary: "[⚠️ P1 주요 경고] NoWait scrape target down"
              description: |
                환경: prod
                조건: NoWait scrape target이 5분 이상 응답하지 않음
                대상 job: {{ $labels.job }}
                대상 instance: {{ $labels.instance }}
                대상 pod: {{ $labels.pod }}
                영향: 해당 Pod의 메트릭 수집이 중단되었습니다.
                우선 확인: Pod 상태, /actuator/prometheus 응답, ServiceMonitor selector, 최근 스케일링/재시작 여부

          # ---------------------------------------------------------------------
          # 노드 / 리소스
          # ---------------------------------------------------------------------
          - alert: HighCpuUsage
            expr: |
              sum(rate(node_cpu_seconds_total{mode!="idle"}[5m])) by (node)
              /
              sum(rate(node_cpu_seconds_total[5m])) by (node)
              * 100 > 80
            for: 5m
            labels:
              severity: warning
              namespace: nowait-prod
              service: node
            annotations:
              summary: "[⚠️ P1 주요 경고] EC2 CPU 사용률 높음"
              description: |
                환경: prod
                조건: 노드 CPU 사용률 > 80% (5분 지속)
                대상 노드: {{ $labels.node }}
                현재값: {{ $value | printf "%.1f" }}%
                우선 확인: kubectl top nodes, Karpenter 증설 여부, 특정 Pod CPU 사용률

          # ---------------------------------------------------------------------
          # API 조기 경고
          # ---------------------------------------------------------------------
          - alert: API5xx에러율증가
            expr: |
              (
                sum(rate(http_server_requests_seconds_count{namespace="nowait-prod",job="nowait-api",status=~"5.."}[5m]))
                /
                clamp_min(
                  sum(rate(http_server_requests_seconds_count{namespace="nowait-prod",job="nowait-api"}[5m])),
                  1e-9
                )
              ) > 0.01
              and
              sum(rate(http_server_requests_seconds_count{namespace="nowait-prod",job="nowait-api"}[5m])) > 0.1
            for: 5m
            labels:
              severity: warning
              namespace: nowait-prod
              service: nowait-api
            annotations:
              summary: "[⚠️ P1 주요 경고] API 5xx 에러율 증가"
              description: |
                서비스: nowait-api / 환경: prod
                조건: 5xx 비율 > 1% (5분 지속, 요청량 0.1 req/s 초과)
                현재값: {{ $value | humanizePercentage }}
                우선 확인: 에러 로그, 최근 배포, DB/Redis 연결 상태

          - alert: APIp95응답시간지연
            expr: |
              histogram_quantile(
                0.95,
                sum(rate(http_server_requests_seconds_bucket{namespace="nowait-prod",job="nowait-api",uri!~"/actuator.*"}[5m])) by (le)
              ) > 1
              and
              sum(rate(http_server_requests_seconds_count{namespace="nowait-prod",job="nowait-api",uri!~"/actuator.*"}[5m])) > 0.1
            for: 5m
            labels:
              severity: warning
              namespace: nowait-prod
              service: nowait-api
            annotations:
              summary: "[⚠️ P1 주요 경고] API p95 응답시간 지연"
              description: |
                서비스: nowait-api / 환경: prod
                조건: API p95 응답시간 > 1초 (5분 지속, 요청량 0.1 req/s 초과)
                현재값: {{ $value | printf "%.2f" }}초
                우선 확인: URI별 p95, HikariCP pending/acquire time, Redis 지연, CPU throttling

          - alert: 대기등록성공률저하
            expr: |
              (
                sum(rate(nowait_waiting_register_success_total{namespace="nowait-prod"}[5m]))
                /
                clamp_min(
                  sum(rate(nowait_waiting_register_success_total{namespace="nowait-prod"}[5m]))
                  +
                  sum(rate(nowait_waiting_register_failure_total{namespace="nowait-prod"}[5m])),
                  1e-9
                )
              ) < 0.99
              and
              (
                sum(rate(nowait_waiting_register_success_total{namespace="nowait-prod"}[5m]))
                +
                sum(rate(nowait_waiting_register_failure_total{namespace="nowait-prod"}[5m]))
              ) > 0
            for: 10m
            labels:
              severity: warning
              namespace: nowait-prod
              service: nowait-api
            annotations:
              summary: "[⚠️ P1 주요 경고] 대기 등록 성공률 저하"
              description: |
                서비스: nowait-api / 환경: prod
                조건: 대기 등록 성공률 < 99% (10분 지속)
                현재값: {{ $value | humanizePercentage }}
                주의: failure metric에 정원 초과/중복 등록 같은 정상 4xx가 포함되어 있다면 오탐 가능성이 있습니다.
                우선 확인: API 5xx 에러율, POST /waitings 응답시간, Redis 상태, failure reason metric 설계

          # ---------------------------------------------------------------------
          # Worker / Queue
          # ---------------------------------------------------------------------
          - alert: Worker저장지연증가
            expr: |
              (
                histogram_quantile(
                  0.95,
                  sum(rate(nowait_worker_persist_lag_seconds_bucket{namespace="nowait-prod"}[5m])) by (le)
                ) > 5
              )
              and
              (
                max(waiting_queue_pending{namespace="nowait-prod"})
                +
                max(reservation_queue_pending{namespace="nowait-prod"})
                > 50
              )
            for: 10m
            labels:
              severity: warning
              namespace: nowait-prod
              service: nowait-worker
            annotations:
              summary: "[⚠️ P1 주요 경고] Worker 저장 지연 증가"
              description: |
                서비스: nowait-worker / 환경: prod
                조건: Redis → DB 영속화 지연 p95 > 5초이고 pending queue > 50인 상태가 10분 지속
                현재값: {{ $value | printf "%.2f" }}초
                우선 확인: pending queue, processing queue, DB 커넥션 대기, Worker Pod 수, KEDA 스케일링

          - alert: Worker저장실패증가
            expr: |
              (
                sum(rate(nowait_worker_persist_failure_total{namespace="nowait-prod"}[5m]))
                /
                clamp_min(
                  sum(rate(nowait_worker_persist_success_total{namespace="nowait-prod"}[5m]))
                  +
                  sum(rate(nowait_worker_persist_failure_total{namespace="nowait-prod"}[5m])),
                  1e-9
                )
              ) > 0.005
              and
              (
                sum(rate(nowait_worker_persist_success_total{namespace="nowait-prod"}[5m]))
                +
                sum(rate(nowait_worker_persist_failure_total{namespace="nowait-prod"}[5m]))
              ) > 0
            for: 5m
            labels:
              severity: warning
              namespace: nowait-prod
              service: nowait-worker
            annotations:
              summary: "[⚠️ P1 주요 경고] Worker 저장 실패 증가"
              description: |
                서비스: nowait-worker / 환경: prod
                조건: Worker DB 저장 실패율 > 0.5% (5분 지속)
                현재값: {{ $value | humanizePercentage }}
                우선 확인: Worker 예외 로그, DB 커넥션, Dead Letter 증가 여부

          - alert: DeadLetter발생
            expr: |
              max(waiting_queue_deadletter{namespace="nowait-prod"})
              +
              max(reservation_queue_deadletter{namespace="nowait-prod"})
              > 0
            for: 0m
            labels:
              severity: warning
              namespace: nowait-prod
              service: nowait-worker
            annotations:
              summary: "[⚠️ P1 주요 경고] Dead Letter 발생"
              description: |
                서비스: nowait-worker / 환경: prod
                조건: waiting 또는 reservation Dead Letter 적재 건수 > 0
                현재값: {{ $value | printf "%.0f" }}건
                영향: Redis에서 DB로 비동기 반영하지 못한 작업이 격리 큐에 쌓였습니다.

          - alert: WorkerPendingQueue적체
            expr: |
              max(waiting_queue_pending{namespace="nowait-prod"})
              +
              max(reservation_queue_pending{namespace="nowait-prod"})
              > 100
            for: 10m
            labels:
              severity: warning
              namespace: nowait-prod
              service: nowait-worker
            annotations:
              summary: "[⚠️ P1 주요 경고] Worker Pending Queue 적체"
              description: |
                서비스: nowait-worker / 환경: prod
                조건: waiting + reservation pending queue > 100 (10분 지속)
                현재값: {{ $value | printf "%.0f" }}건
                영향: Redis에는 작업이 들어왔지만 DB 반영이 지연되고 있습니다.
                우선 확인: Worker Pod 수, KEDA 스케일링, DB 커넥션 대기, RDS 지연, Dead Letter 증가 여부

          - alert: WorkerProcessingQueue정체
            expr: |
              max(waiting_queue_processing{namespace="nowait-prod"})
              +
              max(reservation_queue_processing{namespace="nowait-prod"})
              > 0
            for: 10m
            labels:
              severity: warning
              namespace: nowait-prod
              service: nowait-worker
            annotations:
              summary: "[⚠️ P1 주요 경고] Worker Processing Queue 정체"
              description: |
                서비스: nowait-worker / 환경: prod
                조건: waiting + reservation processing queue > 0 상태가 10분 지속
                현재값: {{ $value | printf "%.0f" }}건
                영향: Worker가 작업을 가져간 뒤 완료 처리하지 못하고 있을 수 있습니다.
                우선 확인: Worker Pod 재시작, DB timeout, 예외 로그, processing queue 복구 로직

          # ---------------------------------------------------------------------
          # DB / Redis 조기 경고
          # ---------------------------------------------------------------------
          - alert: DB커넥션대기발생
            expr: sum(hikaricp_connections_pending{namespace="nowait-prod"}) > 0
            for: 5m
            labels:
              severity: warning
              namespace: nowait-prod
              service: database
            annotations:
              summary: "[⚠️ P1 주요 경고] DB 커넥션 대기 발생"
              description: |
                서비스: nowait-api / nowait-worker / 환경: prod
                조건: HikariCP pending connection > 0 (5분 지속)
                현재값: {{ $value | printf "%.0f" }}개
                영향: DB 커넥션 풀을 즉시 획득하지 못해 요청 또는 Worker 처리 지연이 발생할 수 있습니다.
                우선 확인: hikaricp active/idle/pending, RDS CPU/Connection, 느린 쿼리, max pool size

          - alert: RedisMemory사용률높음
            expr: redis_memory_used_bytes / clamp_min(redis_memory_max_bytes, 1) > 0.75
            for: 10m
            labels:
              severity: warning
              namespace: nowait-prod
              service: redis
            annotations:
              summary: "[⚠️ P1 주요 경고] Redis 메모리 사용률 높음"
              description: |
                서비스: ElastiCache(team6-nowait-prod-redis) / 환경: prod
                조건: Redis memory used / max > 75% (10분 지속)
                현재값: {{ $value | humanizePercentage }}
                영향: 메모리 여유가 줄어 Eviction 위험이 커집니다.
                우선 확인: pending/processing/dead-letter queue 길이, TTL 설정, Redis maxmemory 정책

          # ---------------------------------------------------------------------
          # Kubernetes / Autoscaling
          # ---------------------------------------------------------------------
          - alert: nowaitapi가용Replica부족
            expr: |
              kube_deployment_status_replicas_available{namespace="nowait-prod",deployment="nowait-api"}
              <
              kube_deployment_spec_replicas{namespace="nowait-prod",deployment="nowait-api"}
            for: 10m
            labels:
              severity: warning
              namespace: nowait-prod
              service: nowait-api
            annotations:
              summary: "[⚠️ P1 주요 경고] nowait-api 가용 Replica 부족"
              description: |
                서비스: nowait-api / 환경: prod
                조건: 가용 파드 수 < 배포 목표치 (10분 지속)
                현재 가용: {{ $value | printf "%.0f" }}개
                영향: HPA scale-out, readiness 지연, 리소스 부족 등으로 목표 Replica만큼 준비되지 않았습니다.
                우선 확인: HPA 상태, Pending Pod, readinessProbe 실패, CPU/Memory 부족, Karpenter 증설 상태

          - alert: PendingPod지속발생
            expr: sum(kube_pod_status_phase{namespace="nowait-prod",phase="Pending"}) > 0
            for: 5m
            labels:
              severity: warning
              namespace: nowait-prod
              service: kubernetes
            annotations:
              summary: "[⚠️ P1 주요 경고] Pending Pod 지속 발생"
              description: |
                환경: prod
                조건: nowait-prod 네임스페이스에 Pending Pod가 5분 이상 존재
                현재값: {{ $value | printf "%.0f" }}개
                영향: 자원 부족 또는 스케줄링 실패로 새 Pod가 뜨지 못하고 있습니다.
                우선 확인: kubectl describe pod, 노드 자원, Karpenter 이벤트, taint/toleration, nodeSelector

          - alert: Deployment가용Replica부족
            expr: |
              kube_deployment_status_replicas_available{namespace="nowait-prod",deployment=~"nowait-.*",deployment!="nowait-api"}
              <
              kube_deployment_spec_replicas{namespace="nowait-prod",deployment=~"nowait-.*",deployment!="nowait-api"}
            for: 5m
            labels:
              severity: warning
              namespace: nowait-prod
              service: kubernetes
            annotations:
              summary: "[⚠️ P1 주요 경고] Deployment 가용 Replica 부족"
              description: |
                환경: prod
                대상 워크로드: {{ $labels.deployment }}
                조건: 가용 Replica 수 < 배포 목표치 (5분 지속)
                현재 가용: {{ $value | printf "%.0f" }}개
                영향: 해당 워크로드의 처리량 또는 가용성이 낮아질 수 있습니다.
                우선 확인: rollout status, pod 상태, readinessProbe, 이미지 pull, 리소스 부족

          - alert: HPAMaxReplica도달
            expr: |
              kube_horizontalpodautoscaler_status_current_replicas{namespace="nowait-prod"}
              >=
              kube_horizontalpodautoscaler_spec_max_replicas{namespace="nowait-prod"}
            for: 10m
            labels:
              severity: warning
              namespace: nowait-prod
              service: kubernetes
            annotations:
              summary: "[⚠️ P1 주요 경고] HPA 최대 Replica 도달"
              description: |
                환경: prod
                대상 HPA: {{ $labels.horizontalpodautoscaler }}
                조건: 현재 Replica 수가 maxReplicas에 10분 이상 도달
                영향: 더 이상 Pod 수평 확장이 되지 않아 API/Worker 처리량 한계에 도달했을 수 있습니다.
                우선 확인: HPA maxReplicas, KEDA ScaledObject, 노드 증설, API 응답시간, pending queue


