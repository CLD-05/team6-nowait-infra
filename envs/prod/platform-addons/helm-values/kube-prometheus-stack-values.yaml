# =========================================================================
# AWS EKS 환경에서 접근 불가능한 마스터 노드 컴포넌트 감시 해제
# =========================================================================
kubeControllerManager:
  enabled: false

kubeScheduler:
  enabled: false

kubeProxy:
  enabled: false

# =========================================================================
# request/limit 합산 기준 overcommit 알림 그룹 비활성화
# =========================================================================
# 교육용 단일 EKS 클러스터는 kube_node_role(control-plane)이 잡히지 않아
# KubeCPUOvercommit이 거의 항상 non-HA 분기로 평가되어, 실사용률(kubectl top nodes 1~4%)과
# 무관하게 상시 발동한다. 실사용률 기반 경고는 nowait-alert-rules의 HighCpuUsage(80%)가 대체.
defaultRules:
  rules:
    kubernetesResources: false

# =========================================================================
# [NoWait 프로젝트] 프로메테우스 & 그라파나 & 알람매니저 통합 인프라 설정 파일
# 경로: envs/prod/platform-addons/helm-values/kube-prometheus-stack-values.yaml
# =========================================================================

# -------------------------------------------------------------------------
# 1. 프로메테우스 기지국 및 리소스 설정
# -------------------------------------------------------------------------
prometheus:
  prometheusSpec:
    enableRemoteWriteReceiver: true
    replicas: 1
    retention: 1d
    resources:
      requests:
        cpu: 200m
        memory: 1Gi
      limits:
        cpu: 1000m
        memory: 2Gi
    tolerations:
      - key: "dedicated"
        operator: "Equal"
        value: "monitoring"
        effect: "NoSchedule"
    nodeSelector:
      dedicated: monitoring

# -------------------------------------------------------------------------
# 2. 그라파나 대시보드 화면 및 AWS 연동 설정
# -------------------------------------------------------------------------
grafana:
  replicas: 1
  persistence:
    enabled: true
    type: pvc
    storageClassName: gp2
    accessModes:
      - ReadWriteOnce
    size: 5Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  tolerations:
    - key: "dedicated"
      operator: "Equal"
      value: "monitoring"
      effect: "NoSchedule"
  nodeSelector:
    dedicated: monitoring
  ingress:
    enabled: true
    ingressClassName: alb
    annotations:
      kubernetes.io/ingress.class: alb
      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/target-type: ip
      alb.ingress.kubernetes.io/healthcheck-path: /api/health
      alb.ingress.kubernetes.io/healthcheck-port: "3000"
  hosts: []
  path: /
  pathType: Prefix
  
  # AWS RDS(MySQL) 및 ElastiCache(Redis) 모니터링을 위한 CloudWatch 연동
  additionalDataSources:
    - name: CloudWatch
      uid: cloudwatch
      type: cloudwatch
      jsonData:
        authType: default
        defaultRegion: ap-northeast-2

  # 쿠버네티스 ConfigMap에 등록된 대시보드 파일을 자동으로 감지해서 로딩
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: ALL

# -------------------------------------------------------------------------
# 3. 알람매니저 비상벨 및 라우팅/억제(Inhibit) 설정
# -------------------------------------------------------------------------
alertmanager:
  enabled: true
  alertmanagerSpec:
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
    
    # PVC를 통한 영구 저장 장치 설정 (파드 재시작 시 알람 억제 상태 유실 방지)
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: gp2
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 1Gi
    
    # 비밀 금고(Secret) 이름을 연동하여 Slack Webhook 주소 보안 유지
    secrets:
      - alertmanager-slack-webhook

  config:
    global:
      resolve_timeout: 5m
    route:
      receiver: "null"
      group_by: ["alertname", "severity"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        # P0(Critical) 및 P1(Warning) 알람을 무조건 지정된 슬랙 알림 채널로 발송
        - receiver: slack-notifications
          matchers:
            - severity =~ "warning|critical"
    
    receivers:
      - name: "null"
      - name: slack-notifications
        slack_configs:
          - api_url_file: /etc/alertmanager/secrets/alertmanager-slack-webhook/url
            channel: "#nowait-alerts" # 실무 통합 채널 이름 적용
            send_resolved: true
            title: "{{ .CommonAnnotations.summary }}"
            text: |-
              {{ range .Alerts }}
              *상황:* {{ .Annotations.summary }}
              *상태:* {{ .Status | upper }}
              *등급:* {{ .Labels.severity }}
              *상세 내용:* {{ .Annotations.description }}
              *발생 시각:* {{ .StartsAt.Local }}
              -------------------------------------
              {{ end }}
            
    # 알람 피로도(Alarm Fatigue) 방지를 위한 정밀 경고 억제 규칙
    inhibit_rules:
      # 1. 동일 알람/네임스페이스에서 치명적 장애(Critical) 발생 시 자잘한 경고(Warning) 억제
      - source_matchers: ["severity = critical"]
        target_matchers: ["severity = warning"]
        equal: ["alertname", "namespace"]
      # 2. 동일 마이크로서비스단에서 Critical 발생 시 Warning 경고 숨김
      - source_matchers: ["severity = critical"]
        target_matchers: ["severity = warning"]
        equal: ["service"]
      # 3. [근본 원인] Redis Eviction 발생 시 종속된 워커 관련 경고들 일괄 음소거
      - source_matchers: ['alertname = "RedisEviction발생"']
        target_matchers: ['alertname =~ "Worker저장지연증가|Worker저장실패증가|DeadLetter발생"']
      # 4. [근본 원인] api 서버 가용 복제본(Replica) 부족 시 하위 K8s 컴포넌트 경고 중복 차단
      - source_matchers: ['alertname = "nowaitapi가용Replica부족"']
        target_matchers: ['alertname =~ "PendingPod지속발생|Deployment가용Replica부족"']

# ---------------- ---------------------------------------------------------
# 4. NoWait 정밀 슬랙 알람 규칙 (P0 Critical / P1 Warning)
# -------------------------------------------------------------------------
additionalPrometheusRulesMap:
  nowait-core-alerts:
    groups:
      # ============================ P0 긴급 장애 (Critical) ============================
      - name: nowait-p0-critical
        rules:
          - alert: InstanceDown
            expr: up == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "🚨 [NoWait 비상] 서버 기지국 다운!"
              description: "현재 컴퓨터 주소 {{ $labels.instance }} 가 1분 이상 응답하지 않습니다. 즉시 확인이 필요합니다."

          - alert: 대기등록성공률급락
            expr: |
              (sum(rate(nowait_waiting_register_success_total[5m]))
                / (sum(rate(nowait_waiting_register_success_total[5m])) + sum(rate(nowait_waiting_register_failure_total[5m])))) < 0.99
              and
              (sum(rate(nowait_waiting_register_success_total[5m])) + sum(rate(nowait_waiting_register_failure_total[5m]))) > 0
            for: 5m
            labels:
              severity: critical
              service: nowait-api
            annotations:
              summary: "[🔥 P0 긴급 장애] 대기 등록 성공률 급락"
              description: |
                서비스: nowait-api / 환경: prod
                조건: 대기 등록 성공률 < 99% (5분 지속)
                현재값: {{ $value | humanizePercentage }}
                영향: 사용자가 대기 등록에 실패하고 있습니다.
                우선 확인: 1. API 5xx 에러율 / 2. POST /waitings 응답시간 / 3. Redis 상태 / 4. Dead Letter 적체
                대시보드: http://k8s-monitori-kubeprom-391f767428-2134982071.ap-northeast-2.elb.amazonaws.com/d/nowait-core-ops

          - alert: API5xx에러율높음
            expr: |
              sum(rate(http_server_requests_seconds_count{job="nowait-api",status=~"5.."}[5m]))
                / sum(rate(http_server_requests_seconds_count{job="nowait-api"}[5m])) > 0.05
            for: 5m
            labels:
              severity: critical
              service: nowait-api
            annotations:
              summary: "[🔥 P0 긴급 장애] API 5xx 에러율 높음"
              description: |
                서비스: nowait-api / 환경: prod
                조건: 5xx 비율 > 5% (5분 지속)
                현재값: {{ $value | humanizePercentage }}
                영향: 다수 사용자 요청이 실패하고 있습니다. 내부 예외 로그 및 DB 커넥션 상태를 파악하세요.

          - alert: APIp95응답시간심각
            expr: |
              histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket{job="nowait-api",uri!~"/actuator.*"}[5m])) by (le)) > 3
            for: 5m
            labels:
              severity: critical
              service: nowait-api
            annotations:
              summary: "[🔥 P0 긴급 장애] API p95 응답시간 심각"
              description: |
                서비스: nowait-api / 환경: prod
                조건: p95 응답시간 > 3초 (5분 지속)
                현재값: {{ $value | printf "%.2f" }}초
                영향: 폴링 지연으로 인해 사용자 인터페이스 응답이 마비됩니다. 락(Lock) 병목을 확인하세요.

          - alert: RedisEviction발생
            expr: sum(increase(redis_evicted_keys_total[5m])) > 0
            for: 0m
            labels:
              severity: critical
              service: redis
            annotations:
              summary: "[🔥 P0 긴급 장애] Redis Eviction 발생"
              description: |
                서비스: ElastiCache(team6-nowait-prod-redis) / 환경: prod
                조건: 최근 5분 Eviction 발생 (> 0)
                현재값: {{ $value | printf "%.0f" }}건
                영향: 실시간 대기 메모리 데이터가 유실되어 DB 영속화 전에 증발할 위험이 존재합니다.

          - alert: DeadLetter지속증가
            expr: sum(rate(nowait_worker_dlq_in_total[5m])) > 0
            for: 10m
            labels:
              severity: critical
              service: nowait-worker
            annotations:
              summary: "[🔥 P0 긴급 장애] Dead Letter 지속 증가"
              description: |
                서비스: nowait-worker / 환경: prod
                조건: Dead Letter 유입이 10분간 지속
                현재 유입율: {{ $value | printf "%.3f" }}/s
                영향: 비동기 백엔드 워커가 MySQL 적재를 연속 실패하여 유실 위험 데이터가 격리 큐(waiting:dead-letter)로 이동 중입니다.

          - alert: nowaitapi가용Replica부족
            expr: |
              kube_deployment_status_replicas_available{namespace="nowait-prod",deployment="nowait-api"}
                < kube_deployment_spec_replicas{namespace="nowait-prod",deployment="nowait-api"}
            for: 3m
            labels:
              severity: critical
              service: nowait-api
            annotations:
              summary: "[🔥 P0 긴급 장애] nowait-api 가용 Replica 부족"
              description: |
                서비스: nowait-api / 환경: prod
                조건: 가용 파드 수 < 배포 목표치 (3분 지속)
                현재 가용: {{ $value | printf "%.0f" }}개
                영향: 서빙 가능한 파드가 부족하여 가용성이 차단되었습니다. CrashLoop 상태인지 즉각 점검하세요.

      # ============================ P1 주요 경고 (Warning) ============================
      - name: nowait-p1-warning
        rules:
          - alert: HighCpuUsage
            expr: sum(rate(node_cpu_seconds_total{mode!="idle"}[5m])) by (node) / sum(rate(node_cpu_seconds_total[5m])) by (node) * 100 > 80
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: "⚠️ [NoWait 경고] EC2 CPU 과부하 (80% 돌파)"
              description: "가상 컴퓨터 {{ $labels.node }} 의 CPU 사용량이 5분 동안 80%를 초과했습니다."

          - alert: API5xx에러율증가
            expr: |
              sum(rate(http_server_requests_seconds_count{job="nowait-api",status=~"5.."}[5m]))
                / sum(rate(http_server_requests_seconds_count{job="nowait-api"}[5m])) > 0.01
            for: 5m
            labels:
              severity: warning
              service: nowait-api
            annotations:
              summary: "[⚠️ P1 주요 경고] API 5xx 에러율 증가"
              description: "서비스: nowait-api / 조건: 5xx 비율 > 1% (5분 지속) / 현재값: {{ $value | humanizePercentage }}"

          - alert: APIp95응답시간지연
            expr: |
              histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket{job="nowait-api",uri!~"/actuator.*"}[5m])) by (le)) > 1
            for: 5m
            labels:
              severity: warning
              service: nowait-api
            annotations:
              summary: "[⚠️ P1 주요 경고] API p95 응답시간 지연"
              description: |
                서비스: nowait-api / 조건: p95 응답시간 > 1초 (5분 지속) / 현재값: {{ $value | printf "%.2f" }}초

          - alert: Worker저장지연증가
            expr: |
              histogram_quantile(0.95, sum(rate(nowait_worker_persist_lag_seconds_bucket[5m])) by (le)) > 5
            for: 5m
            labels:
              severity: warning
              service: nowait-worker
            annotations:
              summary: "[⚠️ P1 주요 경고] Worker 저장 지연 증가"
              description: |
                서비스: nowait-worker / 조건: Redis->DB 영속화 지연 p95 > 5초 / 현재값: {{ $value | printf "%.2f" }}초

          - alert: Worker저장실패증가
            expr: |
              (sum(rate(nowait_worker_persist_failure_total[5m]))
                / (sum(rate(nowait_worker_persist_success_total[5m])) + sum(rate(nowait_worker_persist_failure_total[5m])))) > 0.005
              and
              (sum(rate(nowait_worker_persist_success_total[5m])) + sum(rate(nowait_worker_persist_failure_total[5m]))) > 0
            for: 5m
            labels:
              severity: warning
              service: nowait-worker
            annotations:
              summary: "[⚠️ P1 주요 경고] Worker 저장 실패 증가"
              description: "서비스: nowait-worker / 조건: 실패율 > 0.5% / 현재값: {{ $value | humanizePercentage }}"

          - alert: DeadLetter발생
            expr: max(waiting_queue_deadletter) > 0
            for: 0m
            labels:
              severity: warning
              service: nowait-worker
            annotations:
              summary: "[⚠️ P1 주요 경고] Dead Letter 발생"
              description: |
                서비스: nowait-worker / 조건: 격리 큐 적재 건수 > 0 / 현재값: {{ $value | printf "%.0f" }}건

          - alert: DB커넥션대기발생
            expr: sum(hikaricp_connections_pending{namespace="nowait-prod"}) > 0
            for: 5m
            labels:
              severity: warning
              service: nowait-api
            annotations:
              summary: "[⚠️ P1 주요 경고] DB 커넥션 대기 발생"
              description: "서비스: nowait-api / HikariCP 커넥션을 풀에서 획득하지 못해 대기 중인 스레드가 감지되었습니다."

          - alert: PendingPod지속발생
            expr: sum(kube_pod_status_phase{namespace="nowait-prod",phase="Pending"}) > 0
            for: 5m
            labels:
              severity: warning
              service: kubernetes
            annotations:
              summary: "[⚠️ P1 주요 경고] Pending Pod 지속 발생"
              description: "자원 할당 한도 포화 또는 노드 스케줄링 불능으로 대기 중인 파드가 감지되었습니다."

          - alert: Deployment가용Replica부족
            expr: |
              kube_deployment_status_replicas_available{namespace="nowait-prod",deployment=~"nowait-.*",deployment!="nowait-api"}
                < kube_deployment_spec_replicas{namespace="nowait-prod",deployment=~"nowait-.*",deployment!="nowait-api"}
            for: 5m
            labels:
              severity: warning
              service: kubernetes
            annotations:
              summary: "[⚠️ P1 주요 경고] Deployment 가용 Replica 부족"
              description: "대상 워크로드: {{ $labels.deployment }} / 요청된 수치보다 켜져 있는 컨테이너 인스턴스가 부족합니다."